<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的 GitHub 主页</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      /* 渐变背景 */
      background: linear-gradient(120deg, #e0c3fc 0%, #8ec5fc 100%);
      background-attachment: fixed;
      
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      color: #333;
      padding: 20px;
      overflow-x: hidden;
    }

    /* 樱花花瓣样式 */
    .sakura {
      position: fixed;
      top: -10%;
      z-index: -1;
      animation: fall linear infinite;
      pointer-events: none;
    }

    @keyframes fall {
      0% { transform: translateY(-10vh) rotate(0deg) translateX(0); opacity: 1; }
      100% { transform: translateY(110vh) rotate(360deg) translateX(20px); opacity: 0.3; }
    }

    .box {
      /* 磨砂玻璃效果 */
      background: rgba(255, 255, 255, 0.85); /* 稍微调高不透明度，让内容更清晰 */
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 8px 32px rgba(31, 38, 135, 0.15);
      border: 1px solid rgba(255, 255, 255, 0.3);
      text-align: center;
      max-width: 600px; /* 稍微加宽一点以容纳按钮 */
      width: 100%;
      animation: fadeIn 1s ease-out;
    }

    h1 {
      font-size: 28px;
      margin-bottom: 10px;
      color: #222;
    }
    p {
      font-size: 16px;
      color: #555;
      margin-bottom: 30px;
      line-height: 1.6;
    }
    
    /* --- 新增：导航网格样式 --- */
    .nav-grid {
      display: grid;
      grid-template-columns: 1fr 1fr; /* 两列布局 */
      gap: 15px; /* 间距 */
      margin-bottom: 30px;
    }

    .nav-item {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 15px;
      background: rgba(255, 255, 255, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.5);
      border-radius: 12px;
      text-decoration: none;
      color: #444;
      font-weight: 600;
      font-size: 15px;
      transition: all 0.3s ease;
      box-shadow: 0 2px 5px rgba(0,0,0,0.05);
    }

    .nav-item:hover {
      background: #fff;
      transform: translateY(-3px);
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
      color: #2e7d32; /* 悬停时文字变绿 */
      border-color: #2e7d32;
    }
    
    .nav-icon {
      margin-right: 8px;
      font-size: 18px;
    }
    /* ----------------------- */

    @keyframes heartbeat {
      0% { transform: scale(1); }
      14% { transform: scale(1.1); }
      28% { transform: scale(1); }
      42% { transform: scale(1.1); }
      70% { transform: scale(1); }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 24px;
      background: #2e7d32;
      color: white;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 500;
      transition: all 0.3s ease;
      cursor: pointer;
      animation: heartbeat 2s ease-in-out infinite;
    }

    .btn:hover {
      background: #256729;
      transform: scale(1.05);
      box-shadow: 0 4px 12px rgba(46, 125, 50, 0.3);
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>欢迎来到Kevin-in-Zafu的主页 🎉</h1>
    <p>这是我的电子名片<br>可以在这里看我的笔记，随笔或者看我发疯🤩</p>
    
    <!-- 新增：导航选项区域 -->
    <div class="nav-grid">
      <!-- 修改 href 为你的实际文件链接 -->
      <a href="https://github.com/Kevin-inZafu/keven.github.io/Data Structer Resources" class="nav-item">
        <span class="nav-icon">📝</span> 学习笔记
      </a>
      <a href="https://github.com/Kevin-inZafu/keven.github.io/tree/main/my%20virtual%20realm/highlight%20moment" class="nav-item">
        <span class="nav-icon">✍️</span> highlight time and photos
      </a>
      <a href="projects.html" class="nav-item">
        <span class="nav-icon">💻</span> 广告位出租
      </a>
      <a href="https://github.com/Kevin-inZafu/keven.github.io/commit/81fdb7a8e1ee361f031579641e7b83ba87aba85b" class="nav-item">
        <span class="nav-icon">🙋</span> ReadMe&FollowMe
      </a>
    </div>

    <a href="https://github.com/" class="btn">❤️ 前往 GitHub</a>
  </div>

  <!-- 樱花雨脚本 -->
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const body = document.querySelector('body');
      const petalCount = 30;

      for (let i = 0; i < petalCount; i++) {
        const petal = document.createElement('div');
        petal.classList.add('sakura');
        const size = Math.random() * 15 + 10 + 'px';
        petal.style.width = size;
        petal.style.height = size;
        petal.style.left = Math.random() * 100 + 'vw';
        const duration = Math.random() * 5 + 5 + 's';
        petal.style.animationDuration = duration;
        petal.style.animationDelay = Math.random() * 5 + 's';
        petal.innerHTML = '🌸';
        body.appendChild(petal);
      }
    });
  </script>
</body>
</html>
