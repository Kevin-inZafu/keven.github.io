<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kevin Xu的 GitHub 主页</title>
  <style>
    /* --- 全局基础样式 --- */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(120deg, #e0c3fc 0%, #8ec5fc 100%);
      background-attachment: fixed;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      color: #333;
      padding: 20px;
      overflow-x: hidden;
    }

    /* --- 樱花特效样式 --- */
    .sakura { position: fixed; top: -10%; z-index: -1; animation: fall linear infinite; pointer-events: none; }
    @keyframes fall {
      0% { transform: translateY(-10vh) rotate(0deg) translateX(0); opacity: 1; }
      100% { transform: translateY(110vh) rotate(360deg) translateX(20px); opacity: 0.3; }
    }

    /* --- 主页卡片样式 --- */
    .box {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 8px 32px rgba(31, 38, 135, 0.15);
      border: 1px solid rgba(255, 255, 255, 0.3);
      text-align: center;
      max-width: 600px;
      width: 100%;
      animation: fadeIn 1s ease-out;
    }

    h1 { font-size: 28px; margin-bottom: 10px; color: #222; }
    p { font-size: 16px; color: #555; margin-bottom: 30px; line-height: 1.6; }

    /* --- 导航按钮样式 --- */
    .nav-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 30px; }
    .nav-item {
      display: flex; align-items: center; justify-content: center;
      padding: 15px; background: rgba(255, 255, 255, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.5); border-radius: 12px;
      text-decoration: none; color: #444; font-weight: 600;
      transition: all 0.3s ease;
    }
    .nav-item:hover {
      background: #fff; transform: translateY(-3px);
      box-shadow: 0 5px 15px rgba(0,0,0,0.1); color: #2e7d32; border-color: #2e7d32;
    }
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 12px 24px; background: #2e7d32; color: white;
      border-radius: 8px; text-decoration: none; font-weight: 500;
      transition: all 0.3s ease; animation: heartbeat 2s ease-in-out infinite;
    }
    .btn:hover { background: #256729; transform: scale(1.05); }
    @keyframes heartbeat { 0%, 100% { transform: scale(1); } 14% { transform: scale(1.1); } 28% { transform: scale(1); } 42% { transform: scale(1.1); } 70% { transform: scale(1); } }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

    /* =========================================
       新增：悬浮音乐播放器样式
       ========================================= */
    .music-player {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 280px;
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(10px);
      border-radius: 15px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.2);
      padding: 15px;
      z-index: 1000;
      border: 1px solid rgba(255,255,255,0.5);
      transition: all 0.3s ease;
    }

    .music-info {
      margin-bottom: 10px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .music-title {
      font-size: 14px;
      font-weight: bold;
      color: #333;
    }

    .controls {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 15px;
    }

    .control-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 20px;
      color: #555;
      transition: color 0.2s;
    }
    .control-btn:hover { color: #2e7d32; }
    .play-pause-btn { font-size: 30px; }

    /* 进度条样式 */
    .progress-container {
      width: 100%;
      height: 4px;
      background: #ddd;
      border-radius: 2px;
      margin-top: 10px;
      cursor: pointer;
    }
    .progress-bar {
      height: 100%;
      width: 0%;
      background: #2e7d32;
      border-radius: 2px;
    }
  </style>
</head>
<body>

  <!-- 主页内容 -->
  <div class="box">
    <h1>欢迎来到Kevin-in-Zafu的主页 🎉</h1>
    <p>这是我的电子名片<br>可以在这里看我的笔记，随笔或者看我发疯🤩</p>
    
    <div class="nav-grid">
      <a href="https://github.com/Kevin-inZafu/keven.github.io/tree/main/my virtual realm/Data Structer Resources" class="nav-item">
        <span class="nav-icon">📝</span> 学习笔记
      </a>
      <a href="https://github.com/Kevin-inZafu/keven.github.io/tree/main/my%20virtual%20realm/highlight%20moment" class="nav-item">
        <span class="nav-icon">✍️</span> highlight time and photos
      </a>
      <a href="#" class="nav-item">
        <span class="nav-icon">🎵</span> 音乐播放器(右下角)
      </a>
      <a href="https://github.com/Kevin-inZafu/keven.github.io/commit/81fdb7a8e1ee361f031579641e7b83ba87aba85b" class="nav-item">
        <span class="nav-icon">🙋</span> ReadMe&FollowMe
      </a>
    </div>

    <a href="https://github.com/" class="btn">❤️ 前往 GitHub</a>
  </div>

  <!-- =========================================
       新增：音乐播放器 HTML 结构
       ========================================= -->
  <div class="music-player">
    <div class="music-info">
      <div class="music-title" id="current-title">正在播放：加载中...</div>
    </div>
    
    <!-- 控制按钮 -->
    <div class="controls">
      <button class="control-btn" onclick="prevSong()" title="上一首">⏮️</button>
      <button class="control-btn play-pause-btn" onclick="togglePlay()" id="play-btn" title="播放/暂停">▶️</button>
      <button class="control-btn" onclick="nextSong()" title="下一首">⏭️</button>
    </div>

    <!-- 进度条 -->
    <div class="progress-container" onclick="setProgress(event)">
      <div class="progress-bar" id="progress-bar"></div>
    </div>
  </div>

  <!-- 隐藏的音频标签 -->
  <audio id="audio-player"></audio>

  <!-- 樱花雨脚本 -->
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const body = document.querySelector('body');
      const petalCount = 30;
      for (let i = 0; i < petalCount; i++) {
        const petal = document.createElement('div');
        petal.classList.add('sakura');
        const size = Math.random() * 15 + 10 + 'px';
        petal.style.width = size;
        petal.style.height = size;
        petal.style.left = Math.random() * 100 + 'vw';
        const duration = Math.random() * 5 + 5 + 's';
        petal.style.animationDuration = duration;
        petal.style.animationDelay = Math.random() * 5 + 's';
        petal.innerHTML = '🌸';
        body.appendChild(petal);
      }
    });
  </script>

  <!-- =========================================
       新增：音乐播放器 JavaScript 逻辑
       ========================================= -->
  <script>
    // 1. 在这里配置你的音乐列表
    // 可以在 src 中填写本地路径 (如 'music/song.mp3') 或 网络链接
    const playlist = [
      {
        title: "孙燕姿",
        src: "https://www.bilibili.com/video/BV1bNvkBXEyz?t=2.1" 
      },
      {
        title: 那天下雨了",
        src: "https://www.bilibili.com/video/BV19qXQBYEh2?t=3.8" // 这是一个测试用的免费音乐链接
      }
    ];

    let currentTrackIndex = 0;
    const audioPlayer = document.getElementById('audio-player');
    const playBtn = document.getElementById('play-btn');
    const titleDisplay = document.getElementById('current-title');
    const progressBar = document.getElementById('progress-bar');

    // 初始化第一首歌
    function loadTrack(index) {
      audioPlayer.src = playlist[index].src;
      titleDisplay.innerText = "正在播放：" + playlist[index].title;
      audioPlayer.load();
    }

    // 播放/暂停 切换
    function togglePlay() {
      if (audioPlayer.paused) {
        audioPlayer.play();
        playBtn.innerText = "⏸️"; // 暂停图标
      } else {
        audioPlayer.pause();
        playBtn.innerText = "▶️"; // 播放图标
      }
    }

    // 下一首
    function nextSong() {
      currentTrackIndex = (currentTrackIndex + 1) % playlist.length;
      loadTrack(currentTrackIndex);
      audioPlayer.play();
      playBtn.innerText = "⏸️";
    }

    // 上一首
    function prevSong() {
      currentTrackIndex = (currentTrackIndex - 1 + playlist.length) % playlist.length;
      loadTrack(currentTrackIndex);
      audioPlayer.play();
      playBtn.innerText = "⏸️";
    }

    // 自动播放下一首
    audioPlayer.addEventListener('ended', nextSong);

    // 进度条更新
    audioPlayer.addEventListener('timeupdate', function() {
      if (audioPlayer.duration) {
        const progressPercent = (audioPlayer.currentTime / audioPlayer.duration) * 100;
        progressBar.style.width = progressPercent + "%";
      }
    });
<audio controls>
  <source src="your-audio-file.mp3" type="audio/mpeg">
  <source src="your-audio-file.ogg" type="audio/ogg">
  <source src="your-audio-file.wav" type="audio/wav">
  您的浏览器不支持音频播放。
</audio>
    // 点击进度条跳转
    function setProgress(e) {
      const width = this.clientWidth;
      const clickX = e.offsetX;
      const duration = audioPlayer.duration;
      audioPlayer.currentTime = (clickX / width) * duration;
    }

    // 页面加载时初始化
    loadTrack(currentTrackIndex);
  </script>
</body>
</html>
